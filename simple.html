<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoSmart Web Simple View</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap");

      :root {
        --bg-1: #f6f7ec;
        --bg-2: #e6f5f1;
        --panel: #ffffff;
        --ink: #1f2937;
        --muted: #6b7280;
        --accent: #0f766e;
        --accent-soft: #ccfbf1;
        --warn: #9f1239;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 15% 10%, #fff8cc, transparent 30%),
          radial-gradient(circle at 85% 0%, #d1fae5, transparent 35%),
          linear-gradient(160deg, var(--bg-1), var(--bg-2));
        min-height: 100vh;
      }

      .container {
        width: min(1080px, 94vw);
        margin: 28px auto;
      }

      .switch {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 10px;
      }

      .switch a {
        text-decoration: none;
        border: 1px solid #d1d5db;
        border-radius: 999px;
        padding: 8px 12px;
        color: #134e4a;
        background: #fff;
        font-weight: 700;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.7rem, 2.6vw, 2.4rem);
      }

      .subtitle {
        margin: 0 0 22px;
        color: var(--muted);
      }

      .grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      }

      .card {
        background: var(--panel);
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 14px;
        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
      }

      .card h2 {
        margin: 0 0 10px;
        font-size: 1.1rem;
      }

      .row {
        display: flex;
        gap: 8px;
        margin-bottom: 8px;
        flex-wrap: wrap;
      }

      input,
      select,
      button {
        border-radius: 10px;
        border: 1px solid #d1d5db;
        padding: 9px 10px;
        font: inherit;
      }

      input,
      select {
        flex: 1 1 180px;
      }

      button {
        cursor: pointer;
        background: var(--accent);
        color: white;
        border-color: var(--accent);
        font-weight: 700;
      }

      button.secondary {
        background: var(--accent-soft);
        color: #134e4a;
      }

      .status {
        margin-top: 8px;
        font-size: 0.93rem;
        color: var(--muted);
        min-height: 20px;
      }

      .status.error {
        color: var(--warn);
      }

      pre {
        background: #0b1020;
        color: #d1fae5;
        border-radius: 10px;
        padding: 10px;
        overflow-x: auto;
        min-height: 140px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="switch">
        <a href="/index.html">Open Advanced View</a>
      </div>

      <h1>SoSmart Web</h1>
      <p class="subtitle">Simple view for shared statistics and authenticated user actions inside the SoSmart ecosystem.</p>

      <div class="grid">
        <section class="card">
          <h2>Public Daily Statistics</h2>
          <div class="row">
            <input id="publicFrom" type="date" />
            <input id="publicTo" type="date" />
            <button id="publicDailyBtn">Load</button>
          </div>
          <pre id="publicDailyResult">{}</pre>
        </section>

        <section class="card">
          <h2>Authentication</h2>
          <div class="row">
            <input id="registerName" placeholder="Full name" />
            <input id="registerEmail" type="email" placeholder="Email" />
          </div>
          <div class="row">
            <input id="registerPassword" type="password" placeholder="Password (min 8)" />
            <button id="registerBtn" class="secondary">Register</button>
          </div>
          <div class="row">
            <input id="loginEmail" type="email" placeholder="Email" />
            <input id="loginPassword" type="password" placeholder="Password" />
          </div>
          <div class="row">
            <button id="loginBtn">Login</button>
            <button id="meBtn" class="secondary">Profile</button>
            <button id="logoutBtn" class="secondary">Logout</button>
          </div>
          <div id="authStatus" class="status"></div>
        </section>

        <section class="card">
          <h2>Submit Trip</h2>
          <div class="row">
            <input id="origin" placeholder="Origin" />
            <input id="destination" placeholder="Destination" />
          </div>
          <div class="row">
            <select id="transportMode">
              <option value="walking">walking</option>
              <option value="bicycle">bicycle</option>
              <option value="bus">bus</option>
              <option value="car">car</option>
              <option value="tram">tram</option>
              <option value="train">train</option>
              <option value="scooter">scooter</option>
              <option value="other">other</option>
            </select>
            <input id="distanceKm" type="number" step="0.1" min="0.1" placeholder="Distance (km)" />
            <input id="co2SavedKg" type="number" step="0.01" min="0" placeholder="CO2 saved (kg)" />
          </div>
          <div class="row">
            <input id="tripTime" type="datetime-local" />
            <button id="submitTripBtn">Submit</button>
          </div>
          <div id="tripStatus" class="status"></div>
        </section>

        <section class="card">
          <h2>My Statistics</h2>
          <div class="row">
            <input id="myFrom" type="date" />
            <input id="myTo" type="date" />
            <button id="myStatsBtn">Load</button>
          </div>
          <pre id="myResult">{}</pre>
        </section>
      </div>
    </div>

    <script>
      const API_BASE = "/api/v1";
      let accessToken = localStorage.getItem("accessToken") || "";

      function setStatus(id, text, isError = false) {
        const el = document.getElementById(id);
        el.textContent = text;
        el.className = isError ? "status error" : "status";
      }

      function getAuthHeaders() {
        const headers = { "Content-Type": "application/json" };
        if (accessToken) {
          headers.Authorization = `Bearer ${accessToken}`;
        }
        return headers;
      }

      async function apiRequest(path, options = {}) {
        const response = await fetch(`${API_BASE}${path}`, options);
        const contentType = response.headers.get("content-type") || "";
        const payload = contentType.includes("application/json") ? await response.json() : await response.text();
        if (!response.ok) {
          throw new Error(typeof payload === "string" ? payload : payload.detail || "Request failed");
        }
        return payload;
      }

      function toQuery(fromId, toId) {
        const params = new URLSearchParams();
        const from = document.getElementById(fromId).value;
        const to = document.getElementById(toId).value;
        if (from) params.set("from", from);
        if (to) params.set("to", to);
        return params.toString() ? `?${params.toString()}` : "";
      }

      async function loadPublicDailyStats() {
        try {
          const data = await apiRequest(`/stats/public/daily${toQuery("publicFrom", "publicTo")}`);
          document.getElementById("publicDailyResult").textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          document.getElementById("publicDailyResult").textContent = JSON.stringify({ error: error.message }, null, 2);
        }
      }

      async function register() {
        try {
          const data = await apiRequest("/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              full_name: document.getElementById("registerName").value,
              email: document.getElementById("registerEmail").value,
              password: document.getElementById("registerPassword").value,
            }),
          });
          setStatus("authStatus", `Registered ${data.email}`);
        } catch (error) {
          setStatus("authStatus", error.message, true);
        }
      }

      async function login() {
        try {
          const data = await apiRequest("/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email: document.getElementById("loginEmail").value,
              password: document.getElementById("loginPassword").value,
            }),
          });
          accessToken = data.access_token;
          localStorage.setItem("accessToken", accessToken);
          setStatus("authStatus", "Logged in.");
        } catch (error) {
          setStatus("authStatus", error.message, true);
        }
      }

      async function loadProfile() {
        try {
          const data = await apiRequest("/users/me", { headers: getAuthHeaders() });
          setStatus("authStatus", `${data.full_name} (${data.email})`);
        } catch (error) {
          setStatus("authStatus", error.message, true);
        }
      }

      function logout() {
        accessToken = "";
        localStorage.removeItem("accessToken");
        setStatus("authStatus", "Logged out.");
      }

      async function submitTrip() {
        try {
          await apiRequest("/trips", {
            method: "POST",
            headers: getAuthHeaders(),
            body: JSON.stringify({
              origin: document.getElementById("origin").value,
              destination: document.getElementById("destination").value,
              transport_mode: document.getElementById("transportMode").value,
              distance_km: Number(document.getElementById("distanceKm").value),
              co2_saved_kg: Number(document.getElementById("co2SavedKg").value),
              trip_time: document.getElementById("tripTime").value
                ? new Date(document.getElementById("tripTime").value).toISOString()
                : null,
            }),
          });
          setStatus("tripStatus", "Trip submitted.");
        } catch (error) {
          setStatus("tripStatus", error.message, true);
        }
      }

      async function loadMyStats() {
        try {
          const data = await apiRequest(`/stats/me${toQuery("myFrom", "myTo")}`, {
            headers: getAuthHeaders(),
          });
          document.getElementById("myResult").textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          document.getElementById("myResult").textContent = JSON.stringify({ error: error.message }, null, 2);
        }
      }

      document.getElementById("publicDailyBtn").addEventListener("click", loadPublicDailyStats);
      document.getElementById("registerBtn").addEventListener("click", register);
      document.getElementById("loginBtn").addEventListener("click", login);
      document.getElementById("meBtn").addEventListener("click", loadProfile);
      document.getElementById("logoutBtn").addEventListener("click", logout);
      document.getElementById("submitTripBtn").addEventListener("click", submitTrip);
      document.getElementById("myStatsBtn").addEventListener("click", loadMyStats);

      loadPublicDailyStats();
    </script>
  </body>
</html>
